<script>
function resetPassword() {
	var step = 1;
    var mId = $.sModal({
    	header:'Redefinir Senha',
    	width:450,
        form:[
			{label:'Endereço de email',type:'text',name:'user_email',attr:{'placeholder':'Endereço de email',style:'width:300px;'}}
              ],
        animate: 'fadeDown',
        buttons: [{
            text: ' Enviar ',
            addClass: 'btn-primary',
            click: function(id, data) {
            	if (step === 1){
	            	var btnSubmit = $('#'+id).children('.modal-footer').children('a');
	            	btnSubmit.attr({disabled:'disabled'});
	            	btnSubmit.text('Carregando...');
	            	$.post('/pws/index.php/auth_acl/users/resetPassword',{data:{User:{user_email:$('#'+id).find('#user_email').val()}}},function(o){
	            		if (o.send_link === 1){
		            		btnSubmit.attr({disabled:false});
		                	btnSubmit.text('Fechar');
		                	$('#'+id).children('.modal-body').children('div').html('<div class="alert alert-success" style="padding:8px;">Enviamos um e-mail com as instruções de redefinição de senha. Por favor verifique seu email.</div>');
		                	step =2;
	            		}else if (o.send_link === -1){
							btnSubmit.attr({disabled:false});
		                	btnSubmit.text(' Encaminhar ');
	            			step =1;
	            			$('#'+id).find('.alert-error').remove();
	            			$('#'+id).children('.modal-body').children('div').prepend('<div class="alert alert-error" style="padding:8px;"><strong>Atenção!</strong> Você não tem permissão para alterar senha. Envie um email para <strong>' + o.email_admin + '</strong></div>');
						}else{
	            			btnSubmit.attr({disabled:false});
		                	btnSubmit.text(' Encaminhar ');
	            			step =1;
	            			$('#'+id).find('.alert-error').remove();
	            			$('#'+id).children('.modal-body').children('div').prepend('<div class="alert alert-error" style="padding:8px;"><strong>Erro</strong> !, Por favor, forneça um endereço de e-mail correto.</div>');
	            		}
	            	},'json');
            	}else if (step == 2){
            		$.sModal('close', id);
            	}
            }
        }]
        });
    $('#'+mId).find('input[type="text"]').each(function(){
		$(this).keypress(function(event){
			 if ( event.which == 13 ) {
			 	event.preventDefault();
			 }
		});
	});
}
$(document).ready(function(){
	$('#authMessage').each(function(){
		var errors = $('<div class="alert alert-error" style="margin-bottom:0px;"></div>').html($(this).html());
		$('#container').children('.container').prepend(errors);
	});

	$('#flashMessage').each(function(){
		var errors = $('<div class="alert alert-success" style="margin-bottom:0px;"></div>').html($(this).html());
		$('#container').children('.container').prepend(errors);
	});
});
</script>
