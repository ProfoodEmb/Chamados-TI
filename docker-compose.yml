services:
  postgres:
    image: postgres:16-alpine
    container_name: tuicial-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: tuicial
      POSTGRES_PASSWORD: tuicial_password_2024
      POSTGRES_DB: tuicial_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tuicial"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tuicial-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://tuicial:tuicial_password_2024@postgres:5432/tuicial_db?schema=public
      BETTER_AUTH_URL: http://localhost:3000
      NODE_ENV: production
      PORT: 3000
    ports:
      - "3000:3000"
    volumes:
      - uploads_data:/app/public/uploads

volumes:
  postgres_data:
    driver: local
  uploads_data:
    driver: local
